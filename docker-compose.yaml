services:
  postgres:
    image: postgres:17-alpine
    container_name: hoshiilog_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hoshiilog
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - database-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hoshiilog_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - database-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # arq worker running crawl jobs in a process separate from the FastAPI app.
  crawler_worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: hoshiilog_crawler_worker
    restart: unless-stopped
    environment:
      # Reuse the project's settings; point Redis at the compose service.
      REDIS_URL: "redis://redis:6379/0"
      ENVIRONMENT: "LOCAL"
      LOG_LEVEL: "INFO"
      # Tune down if Playwright memory pressure shows up (see WorkerSettings).
      CRAWLER_MAX_JOBS: "10"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - database-network

volumes:
  postgres_data:
  redis_data:

networks:
  database-network:
    driver: bridge